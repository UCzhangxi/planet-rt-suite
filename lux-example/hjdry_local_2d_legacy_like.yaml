reference-state:
  Tref: 0.
  Pref: 1.e5

# Legacy-like 2D local dry setup translated from:
# /Users/inkcloser/Work/SNAP-CANOE/canoe/rtdry/hjdry_cart.inp
# Notes:
# - RT in this suite uses grey Toon forcing (not legacy Disort/Freedman tables),
#   so opacity and stellar flux are best-effort equivalents.
# - For slab layout, world size = nb2 * nb3 = 6 (matches legacy mpiexec -n 6).

species:
  - name: dry
    composition: { H: 1.5, He: 0.15 }
    cv_R: 2.5

geometry:
  type: cartesian

  bounds:
    x1min: 3.6e7
    x1max: 5.0e7
    x2min: 0.
    x2max: 5.0e7
    x3min: -0.5
    x3max: 0.5

  cells:
    nx1: 64
    nx2: 36
    nx3: 1
    nghost: 3

distribute:
  backend: gloo
  layout: slab
  nb2: 6
  nb3: 1
  verbose: false

dynamics:
  equation-of-state:
    type: ideal-moist
    density-floor: 1.e-10
    pressure-floor: 1.e-10
    tracer-floor: 1.e-12
    limiter: true
    max-iter: 30
    ftol: 1.e-6

  vertical-projection:
    type: temperature
    pressure-margin: 1.e-6

  reconstruct:
    vertical: { type: weno5, scale: true, shock: true }
    horizontal: { type: weno5, scale: true, shock: true }

  riemann-solver:
    type: hllc

boundary-condition:
  internal:
    solid-density: 1.e3
    solid-pressure: 1.e9
    max-iter: 5
  external:
    x1-inner: reflecting
    x1-outer: reflecting
    x2-inner: reflecting
    x2-outer: reflecting
    x3-inner: periodic
    x3-outer: periodic

integration:
  type: rk3
  cfl: 0.9
  implicit-scheme: 9
  nlim: -1
  tlim: 1.0368e11
  ncycle_out: 10

outputs:
  - type: restart
    dt: 1.728e8
  - type: netcdf
    variables: [prim]
    dt: 8.64e6
  - type: netcdf
    variables: [uov]
    dt: 8.64e6
  - type: netcdf
    variables: [thermo, path]
    dt: 8.64e6

forcing:
  const-gravity:
    grav1: -1.6667

problem:
  Ts: 1955.7
  Tmin: 400.
  Ps: 1.0e7

  # Orbital fields are ignored in nadir mode; kept for completeness.
  obliquity_deg: 0.0
  true_anomaly_deg: 0.0
  orbital_period: 3.9013056e6   # 45.154 days in seconds
  rotation_period: 3.9013056e6   # tidally locked legacy setup
  subsolar_lon0_deg: 0.0

bottom-relaxation:
  enabled: true
  depth_levels: 3
  tau_bottom: 1.0e3
  tau_top: 1.0e3
  target_temp: 1955.7

radiative-transfer:
  update_dt: 300.0
  sw_surface_albedo: 0.0
  lw_surface_albedo: 0.0
  # Best-effort replacement for legacy HJ irradiation in this grey RT path.
  stellar_flux_nadir: 2.0e4
  zenith_mode: nadir

radiative-transfer-output:
  enable_tau: true
  enable_cell_flux: true
  enable_toa_flux: true

drag:
  enabled: true
  apply_to: [v1, v2, v3]
  reference_wind: { v1: 0.0, v2: 0.0, v3: 0.0 }
  uniform:
    enabled: false
    tau: 0.0
  sponge_top:
    enabled: true
    thickness: 3.0e5
    n_layers: 6
    tau: 1.0e3
  sponge_bottom:
    enabled: false
    thickness: 0.0
    n_layers: 6
    tau: 0.0
  coeff_max: 0.0

chemistry:
  enable_kinetics: false

opacities:
  grey-sw:
    type: jit
    data: [placeholder_not_used_grey_sw.pt]
    species: [dry]
    jit_kwargs: [pres, temp]
    nmom: 1
    parameters: { kappa_a: 5.5e-4, kappa_b: 0.0, kappa_cut: 1.0e-6, w0: 0., g: 0. }

  grey-lw:
    type: jit
    data: [placeholder_not_used_grey_lw.pt]
    species: [dry]
    jit_kwargs: [pres, temp]
    nmom: 1
    parameters: { kappa_a: 1.0e-3, kappa_b: 0.0, kappa_cut: 1.0e-6, w0: 0., g: 0. }

bands:
  - name: sw
    range: [10000.0, 50000.0]
    opacities: [grey-sw]
    solver: toon
    nwave: 1

  - name: lw
    range: [100.0, 10000.0]
    opacities: [grey-lw]
    solver: toon
    nwave: 1
