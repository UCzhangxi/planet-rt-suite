reference-state:
  Tref: 0.
  Pref: 1.e5

# Uranus atmosphere: H2-He dry gas + H2S/CH4 condensates
species:
  - name: dry
    composition: { H: 1.5, He: 0.15 }
    cv_R: 2.5

  - name: H2S
    composition: { H: 2, S: 1 }
    cv_R: 2.5
    u0_R: 0.

  - name: CH4
    composition: { C: 1, H: 4 }
    cv_R: 2.5
    u0_R: 0.

  - name: H2S(s)
    composition: { H: 2, S: 1 }
    cv_R: 9.0
    u0_R: -3000.

  - name: CH4(s)
    composition: { C: 1, H: 4 }
    cv_R: 9.0
    u0_R: -1500.

  - name: H2S(s,p)
    composition: { H: 2, S: 1 }
    cv_R: 9.0
    u0_R: -3000.

  - name: CH4(s,p)
    composition: { C: 1, H: 4 }
    cv_R: 9.0
    u0_R: -1500.

geometry:
  type: gnomonic-equiangle

  bounds:
    x1min: 2.515e7
    x1max: 2.550e7
    x2min_pi: -0.25
    x2max_pi: 0.25
    x3min_pi: -0.25
    x3max_pi: 0.25

  cells:
    nx1: 80
    nx2: 144
    nx3: 144
    nghost: 3

distribute:
  backend: nccl
  layout: cubed-sphere
  nb2: 1
  nb3: 1
  verbose: false

dynamics:
  equation-of-state:
    type: ideal-moist
    density-floor: 1.e-10
    pressure-floor: 1.e-10
    tracer-floor: 1.e-12
    limiter: true
    max-iter: 40
    ftol: 1.e-6

  vertical-projection:
    type: temperature
    pressure-margin: 1.e-6

  reconstruct:
    vertical: { type: weno5, scale: true, shock: true }
    horizontal: { type: weno5, scale: true, shock: true }

  riemann-solver:
    type: hllc

boundary-condition:
  internal:
    solid-density: 1.e3
    solid-pressure: 1.e9
    max-iter: 5
  external:
    x1-inner: reflecting
    x1-outer: reflecting
    x2-inner: custom
    x2-outer: custom
    x3-inner: custom
    x3-outer: custom

integration:
  type: rk3
  cfl: 0.45
  implicit-scheme: 9
  nlim: -1
  tlim: 4.32e7
  ncycle_out: 10

outputs:
  - type: restart
    dt: 8.64e5
  - type: netcdf
    variables: [prim]
    dt: 8.64e4
  - type: netcdf
    variables: [thermo, path]
    dt: 8.64e4
  - type: netcdf
    variables: [uov]
    dt: 8.64e4

forcing:
  const-gravity:
    grav1: -8.87

  coriolis:
    type: xyz
    omega1: 1.0123e-4

sedimentation:
  radius:
    H2S(s,p): 1.0e-10
    CH4(s,p): 1.0e-10

  density:
    H2S(s,p): 1300.
    CH4(s,p): 500.

  const-vsed:
    H2S(s,p): -2.0
    CH4(s,p): -2.0

reactions:
  - equation: H2S => H2S(s)
    type: nucleation
    rate-constant: { formula: h2s_ideal }

  - equation: H2S(s) => H2S(s,p)
    type: coagulation
    rate-constant: { A: 3.e-6, b: 0, Ea_R: 0. }

  - equation: H2S(s,p) => H2S
    type: evaporation
    rate-constant:
      {
        formula: h2s_ideal,
        diff_c: 0.2e-4,
        diff_T: 0.,
        diff_P: 0.,
        vm: 18.e-6,
        diameter: 1.0e-4,
      }

  - equation: CH4 => CH4(s)
    type: nucleation
    rate-constant: { formula: ch4_ideal }

  - equation: CH4(s) => CH4(s,p)
    type: coagulation
    rate-constant: { A: 3.e-6, b: 0, Ea_R: 0. }

  - equation: CH4(s,p) => CH4
    type: evaporation
    rate-constant:
      {
        formula: ch4_ideal,
        diff_c: 0.2e-4,
        diff_T: 0.,
        diff_P: 0.,
        vm: 18.e-6,
        diameter: 1.0e-4,
      }

problem:
  Ts: 250.
  Tmin: 52.
  Ps: 5.e6

  # Initial vapor abundances from old Uranus setup
  xH2S: 3.e-4
  xCH4: 2.3e-2

  obliquity_deg: 97.77
  true_anomaly_deg: 0.0
  orbital_period: 2.651e7  #2.651e9 is the real uranus, reduce for simulation
  rotation_period: 62064.0
  subsolar_lon0_deg: 0.0

bottom-relaxation:
  enabled: true
  depth_levels: 2
  tau_bottom: 1.0e4
  tau_top: 1.0e4
  target_temp: 250.

radiative-transfer:
  update_dt: 500.0
  sw_surface_albedo: 0.0
  lw_surface_albedo: 0.0
  stellar_flux_nadir: 2.61
  zenith_mode: auto

# Controls which custom RT diagnostics are exported via outputs.variables: [uov]
radiative-transfer-output:
  enable_tau: true
  enable_cell_flux: true
  enable_toa_flux: true

chemistry:
  enable_kinetics: true

drag:
  enabled: true
  apply_to: [v1, v2, v3]
  reference_wind: { v1: 0.0, v2: 0.0, v3: 0.0 }
  uniform:
    enabled: false
    tau: 0.0
  sponge_top:
    enabled: true
    p_start: 2.0e4
    p_end: 1.0e3
    tau: 3.0e4
  sponge_bottom:
    enabled: true
    p_start: 8.0e5
    p_end: 3.0e6
    tau: 3.0e4
  coeff_max: 0.0

opacities:
  grey-sw:
    type: jit
    data: [placeholder_not_used_grey_sw.pt]
    species: [dry, H2S, CH4, H2S(s), CH4(s), H2S(s,p), CH4(s,p)]
    jit_kwargs: [pres, temp]
    nmom: 1
    parameters: { kappa_a: 1.0e-2, kappa_b: -0.5, kappa_cut: 1.0e-4, w0: 0., g: 0. }

  grey-lw:
    type: jit
    data: [placeholder_not_used_grey_lw.pt]
    species: [dry, H2S, CH4, H2S(s), CH4(s), H2S(s,p), CH4(s,p)]
    jit_kwargs: [pres, temp]
    nmom: 1
    parameters: { kappa_a: 1.6e-8, kappa_b: 1.0, kappa_cut: 1.0e-4, w0: 0., g: 0. }

bands:
  - name: sw
    range: [10000.0, 50000.0]
    opacities: [grey-sw]
    solver: toon
    nwave: 1

  - name: lw
    range: [10.0, 10000.0]
    opacities: [grey-lw]
    solver: toon
    nwave: 1
